name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
          pnpm --version

      - name: Install root dependencies
        # The web app imports shared contract source from ../src/contracts, so
        # root dependencies such as zod must exist in a clean runner.
        run: pnpm install --frozen-lockfile

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir web typecheck

      - name: Lint
        run: pnpm --dir web lint

      - name: Unit tests
        run: pnpm --dir web test

      - name: Build
        run: pnpm --dir web build

  integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs:
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm test:integration
